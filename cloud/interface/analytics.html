<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФАВН — Аналитика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #0a0a0f;
            color: #c8c8d0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #1a1e2a;
            background: #0d0d14;
            flex-shrink: 0;
            gap: 12px;
        }
        .back-btn {
            padding: 4px 10px;
            border: 1px solid #1a1e2a;
            background: #111318;
            color: #888;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            border-radius: 1px;
            transition: all 0.15s;
        }
        .back-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .logo {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #e0e0e8;
        }
        .subtitle {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
        }
        .iframe-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        .iframe-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0a0f;
        }
        .auth-fallback {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d14;
            color: #555;
            transition: opacity 0.3s;
        }
        .auth-fallback.hidden { display: none; }
        .auth-fallback a {
            color: #3b82f6;
            margin-top: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">&larr; НАЗАД</a>
        <span class="logo">ФАВН</span>
        <span class="subtitle">Аналитика DataLens</span>
    </div>
    <div class="iframe-wrap">
        <iframe id="dl-frame" src="https://datalens.ru/aaamlpcpp7acu" allowfullscreen></iframe>
        <div class="auth-fallback" id="auth-fallback">
            <div style="font-size:48px;margin-bottom:12px;">&#9776;</div>
            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;">Загрузка DataLens...</div>
            <a id="dl-link" href="https://datalens.ru/aaamlpcpp7acu" target="_blank" style="display:none;">Открыть в DataLens (требуется авторизация)</a>
        </div>
    </div>
    <script>
        var frame = document.getElementById('dl-frame');
        var fallback = document.getElementById('auth-fallback');
        frame.onload = function() { fallback.classList.add('hidden'); };
        setTimeout(function() {
            if (!fallback.classList.contains('hidden')) {
                document.getElementById('dl-link').style.display = 'block';
            }
            fallback.classList.add('hidden');
        }, 4000);
    </script>
</body>
</html>
